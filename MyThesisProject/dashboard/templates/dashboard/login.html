<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ | DCA Investment System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #064e3b, #065f46, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            background: #ffffff;
            padding: 45px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-title {
            font-weight: 700;
            color: #065f46;
            margin-bottom: 5px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 30px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #d1d5db;
        }

        .form-control:focus {
            border-color: #047857;
            box-shadow: 0 0 0 0.15rem rgba(4, 120, 87, 0.25);
        }

        .btn-login {
            background-color: #047857;
            border: none;
            padding: 12px;
            border-radius: 10px;
            color: white;
            width: 100%;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-login:hover {
            background-color: #065f46;
        }

        .btn-outline-custom {
            background-color: white;
            border: 1px solid #d1d5db;
            padding: 12px;
            border-radius: 10px;
            color: #374151;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s ease;
        }

        .btn-outline-custom:hover {
            background-color: #f0fdf4;
            border-color: #047857;
            color: #065f46;
        }

        .error-message {
            color: #dc2626;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .brand {
            position: absolute;
            top: 30px;
            left: 40px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="brand">
        A Smart System for Dollar Cost Averaging
    </div>

    <div class="login-card">
        <h4 class="login-title">เข้าสู่ระบบ</h4>
        <div class="login-subtitle">Genetic Algorithm Portfolio Optimization</div>

        <form method="POST">
            {% csrf_token %}

            {% if messages %}
                {% for message in messages %}
                    <div class="error-message">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <input type="text" name="username" class="form-control" placeholder="ชื่อผู้ใช้" required>
            <input type="password" name="password" class="form-control" placeholder="รหัสผ่าน" required>

            <button type="submit" class="btn btn-login mt-2">เข้าสู่ระบบ</button>
            <button type="button" onclick="window.location.href='{% url 'register' %}'" class="btn btn-outline-custom">สมัครสมาชิก</button>
        </form>
    </div>

</body>
</html>
